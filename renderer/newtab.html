<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .logo {
      font-size: 2.8em;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #a78bfa, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 0.85em;
      color: #45475a;
      margin-top: -20px;
      letter-spacing: 0.04em;
    }
    .search-box {
      display: flex;
      gap: 10px;
      width: 580px;
      max-width: 90vw;
    }
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      background: #181825;
      border: 1px solid #313145;
      border-radius: 12px;
      color: #cdd6f4;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-box input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }
    .search-box input::placeholder { color: #45475a; }
    .search-box button {
      padding: 14px 22px;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      border: none;
      border-radius: 12px;
      color: #0f0f17;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .search-box button:hover { opacity: 0.85; }
    .quick-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 580px;
    }
    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #181825;
      border: 1px solid #252535;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: #a6adc8;
      font-size: 11px;
      transition: background 0.15s, border-color 0.15s;
      min-width: 72px;
    }
    .quick-link:hover { background: #252535; border-color: #a78bfa; color: #cdd6f4; }
    .quick-link-icon { font-size: 20px; }
    .tip { font-size: 11px; color: #313145; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">&#11041; Bramble</div>
  <p class="subtitle">Search smarter. Browse privately.</p>

  <div class="search-box">
    <input id="q" type="text" placeholder="Search or enter an address..." autofocus>
    <button id="go">Search</button>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="https://wikipedia.org">
      <span class="quick-link-icon">&#128218;</span>Wikipedia
    </a>
    <a class="quick-link" href="https://news.ycombinator.com">
      <span class="quick-link-icon">&#128311;</span>Hacker News
    </a>
    <a class="quick-link" href="https://github.com">
      <span class="quick-link-icon">&#128025;</span>GitHub
    </a>
    <a class="quick-link" href="https://www.bbc.com/news">
      <span class="quick-link-icon">&#128240;</span>BBC News
    </a>
    <a class="quick-link" href="https://stackoverflow.com">
      <span class="quick-link-icon">&#128172;</span>Stack Overflow
    </a>
    <a class="quick-link" href="https://arxiv.org">
      <span class="quick-link-icon">&#128196;</span>arXiv
    </a>
  </div>

  <p class="tip">Powered by BrambleBot &mdash; a shared, independent web index</p>

  <script>
    const q  = document.getElementById('q');
    const go = document.getElementById('go');

    function isUrl(s) {
      return /^https?:\/\//i.test(s) || /^(localhost|[\w-]+(\.[\w-]+)+)(:\d+)?(\/.*)?$/.test(s);
    }
    function navigate() {
      const val = q.value.trim();
      if (!val) return;
      if (isUrl(val)) {
        window.location.href = val.startsWith('http') ? val : 'https://' + val;
      } else {
        window.location.href = 'search:web:' + encodeURIComponent(val);
      }
    }

    go.addEventListener('click', navigate);
    q.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });

    document.querySelectorAll('.quick-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        window.location.href = a.href;
      });
    });
  </script>
</body>
</html>
