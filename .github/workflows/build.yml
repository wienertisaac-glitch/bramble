name: Build installers

# Builds Bramble for Windows, macOS, and Linux.
# - On every push to a tag like v1.0.0: builds all three and attaches them to the GitHub Release.
# - Manually (workflow_dispatch): builds and uploads artifacts you can download from the run.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Allow the workflow's token to create the Release and upload installers.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        # --publish never: just build the files; the upload step below handles the Release
        # (prevents electron-builder from trying to publish on its own and failing)
        run: npm run dist -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bramble-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
          if-no-files-found: ignore

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
